version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5422:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - "postgres_data:/var/lib/postgresql/data/"
      - "./db/init.sql:/docker-entrypoint-initdb.d/init.sql"
    networks:
      - bystro_network

  analytics_api:
    build: ./analytics_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - bystro_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bystro_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - bystro_network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s

  celery_worker:
    build: ./analytics_api
    container_name: bystro_celery_worker
    command: celery -A tasks.celery_app worker --loglevel=info
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - bystro_network

  traffic_generator:
    build: ./analytics_api
    container_name: bystro_traffic_generator
    command: python generator.py
    environment:
      - API_URL=http://analytics_api:8000/api/v1/events
    depends_on:
      - analytics_api
    networks:
      - bystro_network

volumes:
  postgres_data:

networks:
  bystro_network:
    driver: bridge